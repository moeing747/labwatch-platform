name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          fail=0
          while IFS= read -r subject; do
            printf '%s\n' "$subject" > /tmp/commit-subject
            .githooks/commit-msg /tmp/commit-subject || fail=1
          done < <(git log --no-merges --format=%s)
          exit "$fail"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: ./mvnw -B --no-transfer-progress verify
