name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          fail=0
          checked=0
          while IFS= read -r subject; do
            printf '%s\n' "$subject" > /tmp/commit-subject
            if .githooks/commit-msg /tmp/commit-subject; then
              echo "ok:   $subject"
            else
              echo "FAIL: $subject"
              fail=1
            fi
            checked=$((checked + 1))
          done < <(git log --no-merges --format=%s)
          echo "---"
          echo "$checked commit(s) checked"
          if [ "$checked" -eq 0 ]; then
            echo "No commits were checked; refusing to pass vacuously." >&2
            exit 1
          fi
          exit "$fail"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: ./mvnw -B --no-transfer-progress verify
