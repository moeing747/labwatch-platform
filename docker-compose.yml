services:

  kafka:
    image: apache/kafka:4.2.1
    container_name: labwatch-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: labwatch-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: labwatch
      POSTGRES_PASSWORD: labwatch
      POSTGRES_DB: labwatch
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labwatch -d labwatch"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  asset-service:
    build: services/asset-service
    container_name: labwatch-asset-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/labwatch
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  monitoring-service:
    build: services/monitoring-service
    container_name: labwatch-monitoring-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy

  incident-service:
    build: services/incident-service
    container_name: labwatch-incident-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/labwatch
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  telemetry-service:
    build: services/telemetry-service
    container_name: labwatch-telemetry-service
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy

  telemetry-storage-consumer:
    build: services/telemetry-storage-consumer
    container_name: labwatch-telemetry-storage-consumer
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/labwatch
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: labwatch-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.1.0
    container_name: labwatch-grafana
    ports:
      - "3000:3000"
    environment:
      # Local development stack: no login, straight to the dashboards.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  device-simulator:
    build: simulators/device-simulator
    container_name: labwatch-device-simulator
    profiles:
      - simulation
    command:
      - --target=http://telemetry-service:8082
      - --devices=5
      - --rate=5
      - --failure-profile=temperature-drift
    depends_on:
      telemetry-service:
        condition: service_healthy

volumes:
  postgres-data:
