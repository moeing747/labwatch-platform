server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,kafkaStreams

spring:
  application:
    name: monitoring-service
  kafka:
    bootstrap-servers: localhost:9092
    streams:
      application-id: monitoring-service
      properties:
        # exactly_once_v2 makes the state-store update, the emitted violation
        # event, and the input offset commit atomic. Under at_least_once the
        # ViolationState.notified flag could be persisted locally while the
        # emitted event was lost in a crash - silent violation loss (ADR 0006).
        processing.guarantee: exactly_once_v2
        auto.offset.reset: earliest
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
  jackson:
    deserialization:
      fail-on-unknown-properties: false
